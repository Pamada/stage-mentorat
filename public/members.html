<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MentorMTL - Members Area</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Sign-In API -->
  <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="/">MentorMTL.com</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">HOME</a></li>
          <li class="nav-item"><a class="nav-link" href="/services">SERVICES</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">ABOUT US</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">CONTACT</a></li>
          <li class="nav-item">
            <a class="nav-link btn btn-primary" href="/members">Members Area</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<section class="d-flex justify-content-center align-items-center vh-100 bg-primary">
  <div class="card p-5 shadow-lg">
    <h2 class="text-center mb-4">Login to Account</h2>
    <form action="/members-login" method="POST">
      <div class="mb-3">
        <label for="email" class="form-label">Email address:</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="esteban_schiller@gmail.com" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="d-flex justify-content-between mb-3">
        <div>
          <input class="form-check-input" type="checkbox" id="remember" name="remember">
          <label class="form-check-label" for="remember">Remember Password</label>
        </div>
        <a href="#">Forgot Password?</a>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
      </div>
    </form>

    <div class="text-center my-3">
      <p>or</p>
    </div>

    <!-- Google Sign-In button -->
    <div class="d-grid">
      <div class="g-signin2" data-onsuccess="onSignIn" data-theme="dark"></div>
    </div>

    <div class="text-center mt-3">
      <p>Don't have an account? <a href="/register">Create Account</a></p>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Google Sign-In API -->
<script src="https://apis.google.com/js/platform.js" async defer></script>
<script>
  function onSignIn(googleUser) {
    var profile = googleUser.getBasicProfile();
    var id_token = googleUser.getAuthResponse().id_token;

    console.log('ID: ' + profile.getId());
    console.log('Name: ' + profile.getName());
    console.log('Email: ' + profile.getEmail());

    // Send token to the backend
    fetch('/google-login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ token: id_token })
    }).then(response => response.json())
            .then(data => {
              if (data.success) {
                window.location.href = "/dashboard"; // Redirect to dashboard
              } else {
                alert('Login failed!');
              }
            });
  }
</script>
</body>
</html>

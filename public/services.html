<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorMTL - Register as Mentoree</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100">
        <!-- Left side: Image and brief introduction -->
        <div class="col-md-6 d-none d-md-block">
            <img src="/images/register-mentoree-banner.jpg" alt="Mentoree Registration Banner" class="img-fluid">
            <h1 class="mt-4">MentorMTL.com</h1>
            <p class="lead">MentorMTL.com is the best place to find top-tier mentors. We’ve been incredibly impressed by the quality and expertise of the professionals on our platform.</p>
            <p><strong>Daniela</strong><br>CEO, MentorMTL.com</p>
        </div>

        <!-- Right side: Registration form -->
        <div class="col-md-6">
            <h2>Create an account as a Mentoree</h2>
            <form action="/register-mentoree" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-dark btn-lg w-100">Create Account</button>

                <div class="text-center my-3">or</div>

                <!-- Google Sign-Up button -->
                <div class="d-grid mb-3">
                    <div class="g-signin2" data-onsuccess="onSignIn" data-theme="dark"></div>
                </div>
            </form>
            <p class="mt-2">Already have an account? <a href="/members">Sign in</a></p>
        </div>
    </div>
</div>

<!-- Bootstrap JS and Google Sign-In -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://apis.google.com/js/platform.js" async defer></script>

<script>
    function onSignIn(googleUser) {
        const profile = googleUser.getBasicProfile();
        const id_token = googleUser.getAuthResponse().id_token;

        // Send the token to your backend for verification
        fetch('/google-register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ token: id_token })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = "/dashboard"; // Redirect to dashboard on success
                } else {
                    alert('Google registration failed!');
                }
            });
    }
</script>
</body>
</html>
